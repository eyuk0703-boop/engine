<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Pure Custom Search Engine</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 700px; margin: 0 auto; padding: 40px 20px; background-color: #fff; color: #202124; }
        h1 { font-size: 32px; text-align: center; margin-bottom: 20px; color: #1a73e8; font-weight: bold; }
        .search-container { display: flex; gap: 8px; margin-bottom: 30px; max-width: 600px; margin-left: auto; margin-right: auto; }
        input { flex: 1; padding: 12px 16px; font-size: 16px; border: 1px solid #dfe1e5; border-radius: 24px; outline: none; }
        input:focus { box-shadow: 0 1px 6px rgba(32,33,36,.28); border-color: rgba(223,225,229,0); }
        button { padding: 0 24px; font-size: 14px; font-weight: bold; background-color: #f8f9fa; color: #3c4043; border: 1px solid #dfe1e5; border-radius: 24px; cursor: pointer; }
        button:hover { background-color: #f1f3f4; }
        .status { text-align: center; font-size: 13px; color: #34a853; font-weight: bold; margin-bottom: 20px; }
        .result-count { font-size: 14px; color: #70757a; margin-bottom: 20px; }
        .result-item { margin-bottom: 28px; max-width: 600px; padding: 10px 0; }
        .result-title { font-size: 20px; color: #1a0dab; text-decoration: none; display: inline-block; margin-bottom: 4px; }
        .result-title:hover { text-decoration: underline; }
        .result-url { color: #202124; font-size: 14px; margin-bottom: 4px; word-break: break-all; }
        .result-snippet { color: #4d5156; font-size: 14px; line-height: 1.58; }
        .highlight { background-color: #fff2b2; font-weight: bold; }
    </style>
</head>
<body>

    <h1>🔍 My Web Search</h1>
    <div class="status" id="status">データベース構築中...</div>

    <div class="search-container">
        <input type="text" id="search-input" placeholder="登録されたインターネットデータを検索...">
        <button id="search-button">検索</button>
    </div>

    <div class="result-count" id="result-count"></div>
    <div id="search-results"></div>

    <script>
        // ====================================================
        // 📦 あなたの検索エンジンが持つ「本物のインターネットデータ」
        // 好きなサイトのタイトル、URL、説明文をここに無限に追加できます！
        // ====================================================
        const PAGES_DATABASE = [
            { "title": "Google", "url": "https://google.com", "text": "世界最大の検索エンジン。インターネット上のあらゆるウェブページ、画像、動画、ニュースを検索できます。" },
            { "title": "YouTube", "url": "https://youtube.com", "text": "世界最大の動画共有プラットフォーム。音楽、エンタメ、プログラミング講座、料理レシピなど何でも動画で見つかります。" },
            { "title": "Yahoo! JAPAN", "url": "https://yahoo.co.jp", "text": "日本最大級のポータルサイト。最新ニュース、天気予報、災害速報、乗換案内、占いなど生活に必要な情報が満載です。" },
            { "title": "Wikipedia 日本語版", "url": "https://wikipedia.org", "text": "誰でも編集できるフリーのオンライン百科事典。歴史、科学、地名、アニメ、カルチャーなどあらゆる知識が集まっています。" },
            { "title": "GitHub", "url": "https://github.com", "text": "世界中のエンジニアがプログラムコードを公開・保存している開発者向けプラットフォーム。Gitを使ったバージョン管理が可能です。" },
            { "title": "Amazon.co.jp", "url": "https://amazon.co.jp", "text": "大手通販ショッピングサイト。本、家電、ファッション、食品から日用品まであらゆる商品が素早く手に入ります。" },
            { "title": "X（旧Twitter）", "url": "https://x.com", "text": "今起きていることがリアルタイムでわかるSNS。トレンドワード、最新ニュース、個人のつぶやきが一瞬で拡散されます。" },
            { "title": "Python公式サイト", "url": "https://python.org", "text": "プログラミング言語Pythonの総本山。初心者向けのチュートリアル、最新のアップデート情報、ライブラリのドキュメントがあります。" },
            { "title": "クローラーの基本とスクレイピングマナー", "url": "https://example.com", "text": "ウェブサイトからデータを自動収集するクローラーの作り方。サーバーに負荷をかけないためのtime.sleepなどのマナーを解説。" },
            { "title": "美味しい本格スパイスカレーの作り方", "url": "https://example.com", "text": "チキンカレーやキーマカレーの黄金レシピ。クミン、コリアンダー、ターメリックの3つのスパイスだけで本格的な味になります。" },
            { "title": "JavaScript 全文検索の実装ロジック", "url": "https://example.com", "text": "ブラウザのJavaScriptだけで高速に文字を検索する仕組み。転置インデックス（逆引き辞書）のアルゴリズムをコードで紹介。" }
        ];

        const invertedIndex = {};

        // 外部通信を一切せず、自分のJavaScriptだけでインデックスを組み立てる（絶対安全・爆速）
        function initSearchEngine() {
            PAGES_DATABASE.forEach((page, index) => {
                const fullContent = `${page.title} ${page.text}`.toLowerCase();
                
                // 1文字ずつのN-gram形式でインデックス登録（部分一致を確実にヒットさせるため）
                for (let i = 0; i < fullContent.length; i++) {
                    const char = fullContent.charAt(i).trim();
                    if (!char) continue;
                    if (!invertedIndex[char]) {
                        invertedIndex[char] = [];
                    }
                    invertedIndex[char].push(index);
                }
            });
            document.getElementById('status').innerText = `🟢 準備完了: ${PAGES_DATABASE.length} ページが検索可能です（外部通信なし）`;
        }

        function doSearch() {
            const query = document.getElementById('search-input').value.trim().toLowerCase();
            const resultsContainer = document.getElementById('search-results');
            const countContainer = document.getElementById('result-count');
            
            resultsContainer.innerHTML = '';
            countContainer.innerText = '';

            if (!query) return;

            // プログラム自作の「部分一致」検索アルゴリズム
            const matchedIndexes = new Set();
            PAGES_DATABASE.forEach((page, index) => {
                const fullText = `${page.title} ${page.text}`.toLowerCase();
                if (fullText.includes(query)) {
                    matchedIndexes.add(index);
                }
            });

            if (matchedIndexes.size === 0) {
                countContainer.innerText = '一致する結果は見つかりませんでした。';
                return;
            }

            // ランキング計算（単語の出現回数スコアリング）
            const searchResults = Array.from(matchedIndexes).map(pageIndex => {
                const page = PAGES_DATABASE[pageIndex];
                const fullText = `${page.title} ${page.text}`.toLowerCase();
                const score = (fullText.split(query).length - 1);
                return { ...page, score };
            });

            // スコアが高い順（関連度順）に並び替える
            searchResults.sort((a, b) => b.score - a.score);

            countContainer.innerText = `${searchResults.length} 件見つかりました （関連度順・自作ロジックで計算）`;

            // 画面に出力
            searchResults.forEach(result => {
                const escapedQuery = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                const regex = new RegExp(`(${escapedQuery})`, 'gi');
                const highlightedTitle = result.title.replace(regex, '<span class="highlight">$1</span>');
                const highlightedSnippet = result.text.replace(regex, '<span class="highlight">$1</span>');

                const item = document.createElement('div');
                item.className = 'result-item';
                item.innerHTML = `
                    <div class="result-url">${result.url}</div>
                    <a class="result-title" href="${result.url}" target="_blank">${highlightedTitle}</a>
                    <div class="result-snippet">${highlightedSnippet}</div>
                `;
                resultsContainer.appendChild(item);
            });
        }

        document.getElementById('search-button').addEventListener('click', doSearch);
        document.getElementById('search-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') doSearch();
        });

        // 起動
        initSearchEngine();
    </script>
</body>
</html>
