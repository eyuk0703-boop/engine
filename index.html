<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Real Universal Search Engine</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 700px; margin: 0 auto; padding: 40px 20px; background-color: #fff; color: #202124; }
        h1 { font-size: 32px; text-align: center; margin-bottom: 20px; color: #1a73e8; font-weight: bold; }
        .search-container { display: flex; gap: 8px; margin-bottom: 30px; max-width: 600px; margin-left: auto; margin-right: auto; }
        input { flex: 1; padding: 12px 16px; font-size: 16px; border: 1px solid #dfe1e5; border-radius: 24px; outline: none; }
        input:focus { box-shadow: 0 1px 6px rgba(32,33,36,.28); border-color: rgba(223,225,229,0); }
        button { padding: 0 24px; font-size: 14px; font-weight: bold; background-color: #f8f9fa; color: #3c4043; border: 1px solid #dfe1e5; border-radius: 24px; cursor: pointer; }
        button:hover { background-color: #f1f3f4; }
        .status { text-align: center; font-size: 13px; color: #34a853; font-weight: bold; margin-bottom: 20px; }
        .result-count { font-size: 14px; color: #70757a; margin-bottom: 20px; }
        .result-item { margin-bottom: 28px; max-width: 600px; }
        .result-title { font-size: 20px; color: #1a0dab; text-decoration: none; display: inline-block; margin-bottom: 4px; }
        .result-title:hover { text-decoration: underline; }
        .result-url { color: #202124; font-size: 14px; margin-bottom: 4px; word-break: break-all; }
        .result-snippet { color: #4d5156; font-size: 14px; line-height: 1.58; }
        .error-msg { color: #ea4335; text-align: center; }
    </style>
</head>
<body>

    <h1>🔍 My Web Search</h1>
    <div class="status">🌐 キー不要・インターネット全体をリアルタイム検索中</div>

    <div class="search-container">
        <input type="text" id="search-input" placeholder="インターネット全体から何でも検索...">
        <button id="search-button">検索</button>
    </div>

    <div class="result-count" id="result-count"></div>
    <div id="search-results"></div>

    <script>
        async function doSearch() {
            const query = document.getElementById('search-input').value.trim();
            const resultsContainer = document.getElementById('search-results');
            const countContainer = document.getElementById('result-count');
            
            resultsContainer.innerHTML = '';
            countContainer.innerText = '世界中のWebサイトをスキャン中...';

            if (!query) {
                countContainer.innerText = '';
                return;
            }

            try {
                // 世界中の有志が解放しているオープンな検索エンジンデータベース（SearXNG）の窓口URL
                // json=1 をつけることで、他社の画面ではなく「純粋なデータ」だけをJavaScriptで受信できます
                const url = `https://ononoki.org{encodeURIComponent(query)}&format=json`;
                
                const response = await fetch(url);
                if (!response.ok) throw new Error('データサーバーが混雑しています。時間を置いて再度お試しください。');
                
                const data = await response.json();
                const searchItems = data.results;

                if (!searchItems || searchItems.length === 0) {
                    countContainer.innerText = '一致する結果は見つかりませんでした。';
                    return;
                }

                countContainer.innerText = `インターネット全体から約 ${searchItems.length} 件のWebサイトを検出しました`;

                // 受信した「インターネット全体のデータ」を、あなたのJavaScriptで1件ずつ組み立てて画面に出す
                searchItems.forEach(item => {
                    // 検索結果にノイズ（不要なデータ）が入るのを防ぐ
                    if (!item.title || !item.url) return;

                    const itemDiv = document.createElement('div');
                    itemDiv.className = 'result-item';
                    
                    itemDiv.innerHTML = `
                        <div class="result-url">${item.url}</div>
                        <a class="result-title" href="${item.url}" target="_blank">${item.title}</a>
                        <div class="result-snippet">${item.content || '説明文はありません。'}</div>
                    `;
                    resultsContainer.appendChild(itemDiv);
                });

            } catch (error) {
                countContainer.innerText = '';
                resultsContainer.innerHTML = `<p class="error-msg">❌ 検索エラー: ${error.message}</p>`;
                console.error(error);
            }
        }

        // イベント設定
        document.getElementById('search-button').addEventListener('click', doSearch);
        document.getElementById('search-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') doSearch();
        });
    </script>
</body>
</html>
